name: End-to-End Tests (Aggregate Reports)

on:
  workflow_dispatch:
    inputs:
      flyway-run-id:
        description: 'Run ID from red-gate/flyway-main "Build and Test (PRs)" workflow (leave blank to auto-detect latest successful aggregate-reports build)'
        required: false
        type: string

env:
  REDGATE_DISABLE_TELEMETRY: 'true'

jobs:
  aggregate-reports-enterprise:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Retrieve secrets from Vault
        uses: hashicorp/vault-action@v4.0.0
        with:
          method: jwt
          path: ${{ vars.VAULT_AUTH_PATH }}
          url: ${{ vars.VAULT_URL }}
          role: "flyway-actions"
          secrets: |
            build-secrets/data/repos/red-gate/flyway-actions/service-account email | REDGATE_EMAIL;
            build-secrets/data/repos/red-gate/flyway-actions/service-account token | FLYWAY_TOKEN;

      - name: Find flyway-main run ID
        id: find-run
        if: ${{ !inputs.flyway-run-id }}
        env:
          GH_TOKEN: ${{ secrets.FLYWAY_MAIN_ACTIONS_TOKEN }}
        run: |
          RUN_ID=$(gh api repos/red-gate/flyway-main/actions/runs \
            --jq '[.workflow_runs[] | select(.name=="Build and Test (PRs)" and .head_branch=="aggregate-reports" and .conclusion=="success")] | first | .id')
          if [ -z "$RUN_ID" ] || [ "$RUN_ID" = "null" ]; then
            echo "No successful aggregate-reports build found in red-gate/flyway-main"
            exit 1
          fi
          echo "run-id=$RUN_ID" >> $GITHUB_OUTPUT

      - name: Resolve run ID
        id: run-id
        run: echo "run-id=${{ inputs.flyway-run-id || steps.find-run.outputs.run-id }}" >> $GITHUB_OUTPUT

      - name: Download Flyway CLI artifact
        uses: actions/download-artifact@v8
        with:
          name: redgate-cli-linux
          path: flyway-cli
          repository: red-gate/flyway-main
          run-id: ${{ steps.run-id.outputs.run-id }}
          github-token: ${{ secrets.FLYWAY_MAIN_ACTIONS_TOKEN }}

      - name: Install Flyway CLI
        run: |
          tar -xzf flyway-cli/flyway-commandline-linux-x64.tar.gz -C flyway-cli
          FLYWAY_DIR=$(ls -d flyway-cli/flyway-*)
          echo "$GITHUB_WORKSPACE/$FLYWAY_DIR" >> $GITHUB_PATH

      - name: Authenticate Flyway
        run: flyway auth -email=${{ env.REDGATE_EMAIL }} -token=${{ env.FLYWAY_TOKEN }} -IAgreeToTheEula

      - name: Run aggregate-reports
        id: aggregate-reports
        uses: ./aggregate-reports
        with:
          working-directory: sample-projects/sqlite
