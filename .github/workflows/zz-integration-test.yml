name: Integration Tests

on:
  workflow_call:

env:
  REDGATE_DISABLE_TELEMETRY: 'true'

jobs:
  list:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Run root action
        id: list
        uses: ./
      - name: Test outputs
        shell: bash
        run: |
          set -euo pipefail
          echo "Actions: ${{ steps.list.outputs.actions }}"
          echo '${{ steps.list.outputs.actions }}' | jq -e '. | index("migrations/checks") != null'
          echo '${{ steps.list.outputs.actions }}' | jq -e '. | index("migrations/deploy") != null'
          echo '${{ steps.list.outputs.actions }}' | jq -e '. | index("migrations/undo") != null'
          echo '${{ steps.list.outputs.actions }}' | jq -e '. | index("state/prepare") != null'
          echo '${{ steps.list.outputs.actions }}' | jq -e '. | index("state/deploy") != null'

  migrations-checks:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Retrieve secrets from Vault
        uses: hashicorp/vault-action@v3.4.0
        with:
          method: jwt
          path: ${{ vars.VAULT_AUTH_PATH }}
          url: ${{ vars.VAULT_URL }}
          role: "flyway-actions"
          secrets: |
            build-secrets/data/repos/red-gate/flyway-actions/service-account email | REDGATE_EMAIL;
            build-secrets/data/repos/red-gate/flyway-actions/service-account token | FLYWAY_TOKEN;
      - name: Setup Flyway
        uses: red-gate/setup-flyway@v3
        with:
          edition: enterprise
          i-agree-to-the-eula: true
          email: ${{ env.REDGATE_EMAIL }}
          token: ${{ env.FLYWAY_TOKEN }}
      - name: Run checks
        id: checks
        uses: ./migrations/checks
        with:
          target-url: jdbc:sqlite:database/no-drift.db
          build-url: jdbc:sqlite:database/build.db
          build-ok-to-erase: 'true'
          fail-on-code-review: 'false'
          working-directory: sample-projects/sqlite
          pre-deployment-report-name: migrations-checks-pre-deployment-report-${{ matrix.os }}
          pre-deployment-report-retention-days: '1'
      - name: Download report
        uses: actions/download-artifact@v8
        with:
          name: migrations-checks-pre-deployment-report-${{ matrix.os }}.html
      - name: Verify report exists
        shell: bash
        run: test -s migrations-checks-pre-deployment-report-${{ matrix.os }}.html
      - name: Test outputs
        shell: bash
        run: |
          set -euo pipefail
          echo "Exit code: ${{ steps.checks.outputs.exit-code }}"
          echo "Drift detected: ${{ steps.checks.outputs.drift-detected }}"
          echo "Changed object count: ${{ steps.checks.outputs.changed-object-count }}"
          echo "Code violation count: ${{ steps.checks.outputs.code-violation-count }}"
          echo "Code violation codes: ${{ steps.checks.outputs.code-violation-codes }}"
          test "${{ steps.checks.outputs.exit-code }}" = "0"
          test "${{ steps.checks.outputs.drift-detected }}" = "false"
          test "${{ steps.checks.outputs.changed-object-count }}" = "2"
          test "${{ steps.checks.outputs.code-violation-count }}" = "1"
          test "${{ steps.checks.outputs.code-violation-codes }}" = "AM04"

  migrations-checks-fail-on-drift-true:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Retrieve secrets from Vault
        uses: hashicorp/vault-action@v3.4.0
        with:
          method: jwt
          path: ${{ vars.VAULT_AUTH_PATH }}
          url: ${{ vars.VAULT_URL }}
          role: "flyway-actions"
          secrets: |
            build-secrets/data/repos/red-gate/flyway-actions/service-account email | REDGATE_EMAIL;
            build-secrets/data/repos/red-gate/flyway-actions/service-account token | FLYWAY_TOKEN;
      - name: Setup Flyway
        uses: red-gate/setup-flyway@v3
        with:
          edition: enterprise
          i-agree-to-the-eula: true
          email: ${{ env.REDGATE_EMAIL }}
          token: ${{ env.FLYWAY_TOKEN }}
      - name: Run checks
        id: checks
        uses: ./migrations/checks
        continue-on-error: true
        with:
          target-url: jdbc:sqlite:database/drift.db
          fail-on-code-review: 'false'
          working-directory: sample-projects/sqlite
          pre-deployment-report-name: migrations-checks-fail-on-drift-true-pre-deployment-report-${{ matrix.os }}
          pre-deployment-report-retention-days: '1'
          drift-resolution-scripts-name: migrations-checks-fail-on-drift-true-drift-resolution-scripts-${{ matrix.os }}
          drift-resolution-scripts-retention-days: '1'
      - name: Verify checks failed due to drift
        shell: bash
        run: test "${{ steps.checks.outcome }}" != "success"
      - name: Download report
        uses: actions/download-artifact@v8
        with:
          name: migrations-checks-fail-on-drift-true-pre-deployment-report-${{ matrix.os }}.html
      - name: Verify report exists
        shell: bash
        run: test -s migrations-checks-fail-on-drift-true-pre-deployment-report-${{ matrix.os }}.html
      - name: Download drift resolution scripts
        uses: actions/download-artifact@v8
        with:
          name: migrations-checks-fail-on-drift-true-drift-resolution-scripts-${{ matrix.os }}
      - name: Verify drift resolution scripts exist
        shell: bash
        run: test -n "$(find . -maxdepth 1 -name '*.sql')"
      - name: Test outputs
        shell: bash
        run: |
          set -euo pipefail
          echo "Exit code: ${{ steps.checks.outputs.exit-code }}"
          echo "Drift detected: ${{ steps.checks.outputs.drift-detected }}"
          test "${{ steps.checks.outputs.exit-code }}" = "1"
          test "${{ steps.checks.outputs.drift-detected }}" = "true"

  migrations-checks-fail-on-drift-false:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Retrieve secrets from Vault
        uses: hashicorp/vault-action@v3.4.0
        with:
          method: jwt
          path: ${{ vars.VAULT_AUTH_PATH }}
          url: ${{ vars.VAULT_URL }}
          role: "flyway-actions"
          secrets: |
            build-secrets/data/repos/red-gate/flyway-actions/service-account email | REDGATE_EMAIL;
            build-secrets/data/repos/red-gate/flyway-actions/service-account token | FLYWAY_TOKEN;
      - name: Setup Flyway
        uses: red-gate/setup-flyway@v3
        with:
          edition: enterprise
          i-agree-to-the-eula: true
          email: ${{ env.REDGATE_EMAIL }}
          token: ${{ env.FLYWAY_TOKEN }}
      - name: Run checks
        id: checks
        uses: ./migrations/checks
        with:
          target-url: jdbc:sqlite:database/drift.db
          fail-on-drift: 'false'
          fail-on-code-review: 'false'
          working-directory: sample-projects/sqlite
          pre-deployment-report-name: migrations-checks-fail-on-drift-false-pre-deployment-report-${{ matrix.os }}
          pre-deployment-report-retention-days: '1'
          drift-resolution-scripts-name: migrations-checks-fail-on-drift-false-drift-resolution-scripts-${{ matrix.os }}
          drift-resolution-scripts-retention-days: '1'
      - name: Download report
        uses: actions/download-artifact@v8
        with:
          name: migrations-checks-fail-on-drift-false-pre-deployment-report-${{ matrix.os }}.html
      - name: Verify report exists
        shell: bash
        run: test -s migrations-checks-fail-on-drift-false-pre-deployment-report-${{ matrix.os }}.html
      - name: Download drift resolution scripts
        uses: actions/download-artifact@v8
        with:
          name: migrations-checks-fail-on-drift-false-drift-resolution-scripts-${{ matrix.os }}
      - name: Verify drift resolution scripts exist
        shell: bash
        run: test -n "$(find . -maxdepth 1 -name '*.sql')"
      - name: Test outputs
        shell: bash
        run: |
          set -euo pipefail
          echo "Exit code: ${{ steps.checks.outputs.exit-code }}"
          echo "Drift detected: ${{ steps.checks.outputs.drift-detected }}"
          test "${{ steps.checks.outputs.exit-code }}" = "0"
          test "${{ steps.checks.outputs.drift-detected }}" = "true"

  migrations-checks-fail-on-code-review:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Retrieve secrets from Vault
        uses: hashicorp/vault-action@v3.4.0
        with:
          method: jwt
          path: ${{ vars.VAULT_AUTH_PATH }}
          url: ${{ vars.VAULT_URL }}
          role: "flyway-actions"
          secrets: |
            build-secrets/data/repos/red-gate/flyway-actions/service-account email | REDGATE_EMAIL;
            build-secrets/data/repos/red-gate/flyway-actions/service-account token | FLYWAY_TOKEN;
      - name: Setup Flyway
        uses: red-gate/setup-flyway@v3
        with:
          edition: enterprise
          i-agree-to-the-eula: true
          email: ${{ env.REDGATE_EMAIL }}
          token: ${{ env.FLYWAY_TOKEN }}
      - name: Run checks
        id: checks
        uses: ./migrations/checks
        continue-on-error: true
        with:
          target-url: jdbc:sqlite:database/no-drift.db
          working-directory: sample-projects/sqlite
          skip-pre-deployment-report-upload: 'true'
      - name: Verify checks failed due to code review
        shell: bash
        run: test "${{ steps.checks.outcome }}" != "success"
      - name: Test outputs
        shell: bash
        run: |
          set -euo pipefail
          echo "Exit code: ${{ steps.checks.outputs.exit-code }}"
          echo "Code violation count: ${{ steps.checks.outputs.code-violation-count }}"
          echo "Code violation codes: ${{ steps.checks.outputs.code-violation-codes }}"
          test "${{ steps.checks.outputs.exit-code }}" = "1"
          test "${{ steps.checks.outputs.code-violation-count }}" = "1"
          test "${{ steps.checks.outputs.code-violation-codes }}" = "AM04"

  migrations-deploy-no-drift:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Retrieve secrets from Vault
        uses: hashicorp/vault-action@v3.4.0
        with:
          method: jwt
          path: ${{ vars.VAULT_AUTH_PATH }}
          url: ${{ vars.VAULT_URL }}
          role: "flyway-actions"
          secrets: |
            build-secrets/data/repos/red-gate/flyway-actions/service-account email | REDGATE_EMAIL;
            build-secrets/data/repos/red-gate/flyway-actions/service-account token | FLYWAY_TOKEN;
      - name: Setup Flyway
        uses: red-gate/setup-flyway@v3
        with:
          edition: enterprise
          i-agree-to-the-eula: true
          email: ${{ env.REDGATE_EMAIL }}
          token: ${{ env.FLYWAY_TOKEN }}
      - name: Run migrations deploy
        id: deploy
        uses: ./migrations/deploy
        with:
          target-url: jdbc:sqlite:database/no-drift.db
          working-directory: sample-projects/sqlite
          deployment-report-name: migrations-deploy-no-drift-deployment-report-${{ matrix.os }}
      - name: Test outputs
        shell: bash
        run: |
          set -euo pipefail
          echo "Exit code: ${{ steps.deploy.outputs.exit-code }}"
          echo "Drift detected: ${{ steps.deploy.outputs.drift-detected }}"
          echo "Migrations applied: ${{ steps.deploy.outputs.migrations-applied }}"
          echo "Schema version: ${{ steps.deploy.outputs.schema-version }}"
          test "${{ steps.deploy.outputs.exit-code }}" = "0"
          test "${{ steps.deploy.outputs.drift-detected }}" = "false"
          test "${{ steps.deploy.outputs.migrations-applied }}" = "3"
          test "${{ steps.deploy.outputs.schema-version }}" = "3"

  migrations-deploy-drift:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Retrieve secrets from Vault
        uses: hashicorp/vault-action@v3.4.0
        with:
          method: jwt
          path: ${{ vars.VAULT_AUTH_PATH }}
          url: ${{ vars.VAULT_URL }}
          role: "flyway-actions"
          secrets: |
            build-secrets/data/repos/red-gate/flyway-actions/service-account email | REDGATE_EMAIL;
            build-secrets/data/repos/red-gate/flyway-actions/service-account token | FLYWAY_TOKEN;
      - name: Setup Flyway
        uses: red-gate/setup-flyway@v3
        with:
          edition: enterprise
          i-agree-to-the-eula: true
          email: ${{ env.REDGATE_EMAIL }}
          token: ${{ env.FLYWAY_TOKEN }}
      - name: Run migrations deploy
        id: deploy
        uses: ./migrations/deploy
        continue-on-error: true
        with:
          target-url: jdbc:sqlite:database/drift.db
          working-directory: sample-projects/sqlite
          deployment-report-name: migrations-deploy-drift-deployment-report-${{ matrix.os }}
          deployment-report-retention-days: '1'
          drift-resolution-scripts-name: migrations-deploy-drift-drift-resolution-scripts-${{ matrix.os }}
          drift-resolution-scripts-retention-days: '1'
      - name: Verify deploy failed due to drift
        shell: bash
        run: test "${{ steps.deploy.outcome }}" != "success"
      - name: Download deployment report
        uses: actions/download-artifact@v8
        with:
          name: migrations-deploy-drift-deployment-report-${{ matrix.os }}.html
      - name: Verify deployment report exists
        shell: bash
        run: test -s migrations-deploy-drift-deployment-report-${{ matrix.os }}.html
      - name: Download drift resolution scripts
        uses: actions/download-artifact@v8
        with:
          name: migrations-deploy-drift-drift-resolution-scripts-${{ matrix.os }}
      - name: Verify drift resolution scripts exist
        shell: bash
        run: test -n "$(find . -maxdepth 1 -name '*.sql')"
      - name: Test outputs
        shell: bash
        run: |
          set -euo pipefail
          echo "Exit code: ${{ steps.deploy.outputs.exit-code }}"
          echo "Drift detected: ${{ steps.deploy.outputs.drift-detected }}"
          echo "Migrations applied: ${{ steps.deploy.outputs.migrations-applied }}"
          echo "Schema version: ${{ steps.deploy.outputs.schema-version }}"
          test "${{ steps.deploy.outputs.exit-code }}" = "1"
          test "${{ steps.deploy.outputs.drift-detected }}" = "true"
          test "${{ steps.deploy.outputs.migrations-applied }}" = ""
          test "${{ steps.deploy.outputs.schema-version }}" = ""

  migrations-undo-no-drift:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Retrieve secrets from Vault
        uses: hashicorp/vault-action@v3.4.0
        with:
          method: jwt
          path: ${{ vars.VAULT_AUTH_PATH }}
          url: ${{ vars.VAULT_URL }}
          role: "flyway-actions"
          secrets: |
            build-secrets/data/repos/red-gate/flyway-actions/service-account email | REDGATE_EMAIL;
            build-secrets/data/repos/red-gate/flyway-actions/service-account token | FLYWAY_TOKEN;
      - name: Setup Flyway
        uses: red-gate/setup-flyway@v3
        with:
          edition: enterprise
          i-agree-to-the-eula: true
          email: ${{ env.REDGATE_EMAIL }}
          token: ${{ env.FLYWAY_TOKEN }}
      - name: Run migrations undo
        id: undo
        uses: ./migrations/undo
        with:
          target-url: jdbc:sqlite:database/undo.db
          working-directory: sample-projects/sqlite
          undo-report-name: migrations-undo-no-drift-undo-report-${{ matrix.os }}
      - name: Test outputs
        shell: bash
        run: |
          set -euo pipefail
          echo "Exit code: ${{ steps.undo.outputs.exit-code }}"
          echo "Drift detected: ${{ steps.undo.outputs.drift-detected }}"
          echo "Migrations undone: ${{ steps.undo.outputs.migrations-undone }}"
          echo "Schema version: ${{ steps.undo.outputs.schema-version }}"
          test "${{ steps.undo.outputs.exit-code }}" = "0"
          test "${{ steps.undo.outputs.drift-detected }}" = "false"
          test "${{ steps.undo.outputs.migrations-undone }}" = "1"
          test "${{ steps.undo.outputs.schema-version }}" = "2"

  migrations-undo-drift:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Retrieve secrets from Vault
        uses: hashicorp/vault-action@v3.4.0
        with:
          method: jwt
          path: ${{ vars.VAULT_AUTH_PATH }}
          url: ${{ vars.VAULT_URL }}
          role: "flyway-actions"
          secrets: |
            build-secrets/data/repos/red-gate/flyway-actions/service-account email | REDGATE_EMAIL;
            build-secrets/data/repos/red-gate/flyway-actions/service-account token | FLYWAY_TOKEN;
      - name: Setup Flyway
        uses: red-gate/setup-flyway@v3
        with:
          edition: enterprise
          i-agree-to-the-eula: true
          email: ${{ env.REDGATE_EMAIL }}
          token: ${{ env.FLYWAY_TOKEN }}
      - name: Run migrations undo
        id: undo
        uses: ./migrations/undo
        continue-on-error: true
        with:
          target-url: jdbc:sqlite:database/drift.db
          working-directory: sample-projects/sqlite
          undo-report-name: migrations-undo-drift-undo-report-${{ matrix.os }}
          undo-report-retention-days: '1'
          drift-resolution-scripts-name: migrations-undo-drift-drift-resolution-scripts-${{ matrix.os }}
          drift-resolution-scripts-retention-days: '1'
      - name: Download undo report
        uses: actions/download-artifact@v8
        with:
          name: migrations-undo-drift-undo-report-${{ matrix.os }}.html
      - name: Verify undo report exists
        shell: bash
        run: test -s migrations-undo-drift-undo-report-${{ matrix.os }}.html
      - name: Download drift resolution scripts
        uses: actions/download-artifact@v8
        with:
          name: migrations-undo-drift-drift-resolution-scripts-${{ matrix.os }}
      - name: Verify drift resolution scripts exist
        shell: bash
        run: test -n "$(find . -maxdepth 1 -name '*.sql')"
      - name: Verify undo failed due to drift
        shell: bash
        run: test "${{ steps.undo.outcome }}" != "success"
      - name: Test outputs
        shell: bash
        run: |
          set -euo pipefail
          echo "Exit code: ${{ steps.undo.outputs.exit-code }}"
          echo "Drift detected: ${{ steps.undo.outputs.drift-detected }}"
          echo "Migrations undone: ${{ steps.undo.outputs.migrations-undone }}"
          echo "Schema version: ${{ steps.undo.outputs.schema-version }}"
          test "${{ steps.undo.outputs.exit-code }}" = "1"
          test "${{ steps.undo.outputs.drift-detected }}" = "true"
          test "${{ steps.undo.outputs.migrations-undone }}" = ""
          test "${{ steps.undo.outputs.schema-version }}" = ""

  state-prepare-no-drift:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Retrieve secrets from Vault
        uses: hashicorp/vault-action@v3.4.0
        with:
          method: jwt
          path: ${{ vars.VAULT_AUTH_PATH }}
          url: ${{ vars.VAULT_URL }}
          role: "flyway-actions"
          secrets: |
            build-secrets/data/repos/red-gate/flyway-actions/service-account email | REDGATE_EMAIL;
            build-secrets/data/repos/red-gate/flyway-actions/service-account token | FLYWAY_TOKEN;
      - name: Setup Flyway
        uses: red-gate/setup-flyway@v3
        with:
          edition: enterprise
          i-agree-to-the-eula: true
          email: ${{ env.REDGATE_EMAIL }}
          token: ${{ env.FLYWAY_TOKEN }}
      - name: Run state prepare
        id: prepare
        uses: ./state/prepare
        with:
          target-environment: production
          target-url: jdbc:sqlite:state-prepare-target.db
          working-directory: sample-projects/sqlite-state
          skip-code-review: 'true'
          pre-deployment-report-name: state-prepare-no-drift-pre-deployment-report-${{ matrix.os }}
          deployment-script-name: state-prepare-no-drift-deployment-script-${{ matrix.os }}
          undo-script-name: state-prepare-no-drift-undo-script-${{ matrix.os }}
          deployment-script-retention-days: '1'
      - name: Test prepare outputs
        shell: bash
        run: |
          set -euo pipefail
          echo "Exit code: ${{ steps.prepare.outputs.exit-code }}"
          echo "Script path: ${{ steps.prepare.outputs.script-path }}"
          echo "Undo script path: ${{ steps.prepare.outputs.undo-script-path }}"
          echo "Changed object count: ${{ steps.prepare.outputs.changed-object-count }}"
          test "${{ steps.prepare.outputs.exit-code }}" = "0"
          [[ "${{ steps.prepare.outputs.script-path }}" == *state-prepare-no-drift-deployment-script-${{ matrix.os }}.sql ]]
          [[ "${{ steps.prepare.outputs.undo-script-path }}" == *state-prepare-no-drift-undo-script-${{ matrix.os }}.sql ]]
          test "${{ steps.prepare.outputs.changed-object-count }}" = "3"
      - name: Download deployment script
        uses: actions/download-artifact@v8
        with:
          name: state-prepare-no-drift-deployment-script-${{ matrix.os }}.sql
      - name: Verify deployment script exists
        shell: bash
        run: test -s state-prepare-no-drift-deployment-script-${{ matrix.os }}.sql
      - name: Download undo script
        uses: actions/download-artifact@v8
        with:
          name: state-prepare-no-drift-undo-script-${{ matrix.os }}.sql
      - name: Verify undo script exists
        shell: bash
        run: test -s state-prepare-no-drift-undo-script-${{ matrix.os }}.sql

  state-prepare-drift:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Retrieve secrets from Vault
        uses: hashicorp/vault-action@v3.4.0
        with:
          method: jwt
          path: ${{ vars.VAULT_AUTH_PATH }}
          url: ${{ vars.VAULT_URL }}
          role: "flyway-actions"
          secrets: |
            build-secrets/data/repos/red-gate/flyway-actions/service-account email | REDGATE_EMAIL;
            build-secrets/data/repos/red-gate/flyway-actions/service-account token | FLYWAY_TOKEN;
      - name: Setup Flyway
        uses: red-gate/setup-flyway@v3
        with:
          edition: enterprise
          i-agree-to-the-eula: true
          email: ${{ env.REDGATE_EMAIL }}
          token: ${{ env.FLYWAY_TOKEN }}
      - name: Run state prepare with drift
        id: prepare
        uses: ./state/prepare
        continue-on-error: true
        with:
          target-environment: production
          target-url: jdbc:sqlite:../sqlite/database/drift.db
          working-directory: sample-projects/sqlite-state
          skip-code-review: 'true'
