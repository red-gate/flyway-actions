name: 'Flyway State Prepare Action'
description: 'A GitHub Action to generate a Flyway state-based deployment script'
author: 'Redgate'

branding:
  icon: 'database'
  color: 'red'

inputs:
  target-environment:
    description: 'Target database environment'
    required: false
    default: 'default'
  target-url:
    description: 'JDBC URL for the target database'
    required: false
  target-user:
    description: 'Database user for the target database'
    required: false
  target-password:
    description: 'Database password for the target database'
    required: false
  target-schemas:
    description: 'Comma-separated list of schemas'
    required: false
  generate-undo:
    description: 'Generate undo script alongside deploy script'
    required: false
    default: 'true'
  fail-on-drift:
    description: 'Fail when drift is detected'
    required: false
    default: 'true'
  skip-drift-check:
    description: 'Skip the drift check'
    required: false
    default: 'false'
  fail-on-code-review:
    description: 'Fail when code review violations are detected'
    required: false
    default: 'true'
  skip-code-review:
    description: 'Skip the code review check'
    required: false
    default: 'false'
  skip-deployment-changes-report:
    description: 'Skip the deployment changes report'
    required: false
    default: 'false'
  working-directory:
    description: 'Working directory for Flyway'
    required: false
  provision-mode:
    description: 'Controls how Flyway runs the provisioner when running prepare, if one is configured'
    required: false
  extra-args:
    description: 'Additional Flyway CLI arguments'
    required: false
  skip-pre-deployment-report-upload:
    description: 'Skip uploading the pre-deployment report as a workflow artifact'
    required: false
    default: 'false'
  pre-deployment-report-name:
    description: 'Name for the pre-deployment report artifact. Defaults to flyway-<target-environment>-pre-deployment-report'
    required: false
  pre-deployment-report-retention-days:
    description: 'Number of days to retain the pre-deployment report artifact'
    required: false
    default: '7'
  skip-drift-resolution-scripts-upload:
    description: 'Skip uploading drift resolution scripts as a workflow artifact'
    required: false
    default: 'false'
  drift-resolution-scripts-name:
    description: 'Name for the drift resolution scripts artifact. Defaults to flyway-prepare-<target-environment>-drift-resolution-scripts'
    required: false
  drift-resolution-scripts-retention-days:
    description: 'Number of days to retain the drift resolution scripts artifact'
    required: false
    default: '7'
  skip-deployment-script-upload:
    description: 'Skip uploading the deployment and undo scripts as workflow artifacts'
    required: false
    default: 'false'
  deployment-script-name:
    description: 'Custom name for the deployment script artifact and output file (without file extension). This will be put in a deployments folder. Defaults to D__<target-environment>_deployment'
    required: false
  undo-script-name:
    description: 'Custom name for the undo script artifact and output file (without file extension). This will be put in a deployments folder. Defaults to DU__<target-environment>_undo'
    required: false
  deployment-script-retention-days:
    description: 'Number of days to retain the deployment and undo script artifacts'
    required: false
    default: '7'
  skip-code-scanning-upload:
    description: 'Skip uploading SARIF results to GitHub Code Scanning'
    required: false
    default: 'false'

outputs:
  exit-code:
    description: 'Flyway exit code'
    value: ${{ steps.prepare.outputs.exit-code }}
  drift-detected:
    description: 'Whether drift was detected (empty if skipped)'
    value: ${{ steps.prepare.outputs.drift-detected }}
  code-violation-count:
    description: 'Number of code review violations found (empty if skipped)'
    value: ${{ steps.prepare.outputs.code-violation-count }}
  code-violation-codes:
    description: 'Comma-separated list of code review violation codes (empty if skipped)'
    value: ${{ steps.prepare.outputs.code-violation-codes }}
  sarif-path:
    description: 'Path to the SARIF report from code review (empty if not generated or skipped)'
    value: ${{ steps.prepare.outputs.sarif-path }}
  changed-object-count:
    description: 'Number of changed objects detected (empty if skipped)'
    value: ${{ steps.prepare.outputs.changed-object-count }}
  script-path:
    description: 'Path to the generated deployment script'
    value: ${{ steps.prepare.outputs.script-path }}
  undo-script-path:
    description: 'Path to the generated undo script'
    value: ${{ steps.prepare.outputs.undo-script-path }}

runs:
  using: 'composite'
  steps:
    - name: Check for Node.js
      if: runner.environment != 'github-hosted'
      id: check-node
      run: |
        if ! command -v node &>/dev/null; then
          echo "node-not-found=true" >> "$GITHUB_OUTPUT"
        fi
      shell: bash
    - name: Install Node.js
      if: steps.check-node.outputs.node-not-found == 'true'
      uses: actions/setup-node@v4
      with:
        node-version: 'lts/*'
    - name: Run Flyway prepare
      id: prepare
      run: node "${{ github.action_path }}/dist/index.js"
      shell: bash
      env:
        FLYWAY_INPUTS: ${{ toJSON(inputs) }}
    - name: Upload pre-deployment report
      id: upload-pre-deployment-report
      if: inputs.skip-pre-deployment-report-upload == 'false' && steps.prepare.outputs.report-path != '' && always()
      uses: actions/upload-artifact@v7
      with:
        name: ${{ inputs.pre-deployment-report-name || format('flyway-{0}-pre-deployment-report', inputs.target-environment) }}
        path: ${{ steps.prepare.outputs.report-path }}
        archive: false
        retention-days: ${{ inputs.pre-deployment-report-retention-days }}
        if-no-files-found: ignore
    - name: Upload drift resolution scripts
      id: upload-drift-resolution-scripts
      if: inputs.skip-drift-resolution-scripts-upload == 'false' && steps.prepare.outputs.drift-resolution-folder != '' && always()
      uses: actions/upload-artifact@v7
      with:
        name: ${{ inputs.drift-resolution-scripts-name || format('flyway-prepare-{0}-drift-resolution-scripts', inputs.target-environment) }}
        path: ${{ steps.prepare.outputs.drift-resolution-folder }}
        retention-days: ${{ inputs.drift-resolution-scripts-retention-days }}
        if-no-files-found: ignore
    - name: Upload deployment script
      id: upload-deployment-script
      if: inputs.skip-deployment-script-upload == 'false' && steps.prepare.outputs.script-path != '' && always()
      uses: actions/upload-artifact@v7
      with:
        name: ${{ inputs.deployment-script-name || format('D__{0}_deployment', inputs.target-environment) }}
        path: ${{ steps.prepare.outputs.script-path }}
        archive: false
        retention-days: ${{ inputs.deployment-script-retention-days }}
    - name: Upload undo script
      id: upload-undo-script
      if: inputs.skip-deployment-script-upload == 'false' && steps.prepare.outputs.undo-script-path != '' && always()
      uses: actions/upload-artifact@v7
      with:
        name: ${{ inputs.undo-script-name || format('DU__{0}_undo', inputs.target-environment) }}
        path: ${{ steps.prepare.outputs.undo-script-path }}
        archive: false
        retention-days: ${{ inputs.deployment-script-retention-days }}
        if-no-files-found: ignore
    - name: Append artifacts to summary
      if: always() && (steps.upload-pre-deployment-report.outputs.artifact-url != '' || steps.upload-drift-resolution-scripts.outputs.artifact-url != '' || steps.upload-deployment-script.outputs.artifact-url != '' || steps.upload-undo-script.outputs.artifact-url != '')
      shell: bash
      run: |
        echo "" >> "$GITHUB_STEP_SUMMARY"
        if [[ -n "${{ steps.upload-pre-deployment-report.outputs.artifact-url }}" ]]; then
          echo "- [${{ inputs.pre-deployment-report-name || format('flyway-{0}-pre-deployment-report', inputs.target-environment) }}](${{ steps.upload-pre-deployment-report.outputs.artifact-url }})" >> "$GITHUB_STEP_SUMMARY"
        fi
        if [[ -n "${{ steps.upload-drift-resolution-scripts.outputs.artifact-url }}" ]]; then
          echo "- [${{ inputs.drift-resolution-scripts-name || format('flyway-prepare-{0}-drift-resolution-scripts', inputs.target-environment) }}](${{ steps.upload-drift-resolution-scripts.outputs.artifact-url }})" >> "$GITHUB_STEP_SUMMARY"
        fi
        if [[ -n "${{ steps.upload-deployment-script.outputs.artifact-url }}" ]]; then
          echo "- [${{ inputs.deployment-script-name || format('D__{0}_deployment', inputs.target-environment) }}](${{ steps.upload-deployment-script.outputs.artifact-url }})" >> "$GITHUB_STEP_SUMMARY"
        fi
        if [[ -n "${{ steps.upload-undo-script.outputs.artifact-url }}" ]]; then
          echo "- [${{ inputs.undo-script-name || format('DU__{0}_undo', inputs.target-environment) }}](${{ steps.upload-undo-script.outputs.artifact-url }})" >> "$GITHUB_STEP_SUMMARY"
        fi
    - name: Upload SARIF to GitHub Code Scanning
      if: always() && inputs.skip-code-scanning-upload == 'false' && steps.prepare.outputs.sarif-path != ''
      uses: github/codeql-action/upload-sarif@v4
      continue-on-error: true
      with:
        sarif_file: ${{ steps.prepare.outputs.sarif-path }}
        category: flyway-code-review
        wait-for-processing: false
