name: 'Flyway State Prepare Action'
description: 'A GitHub Action to generate a Flyway state-based deployment script'
author: 'Redgate'

branding:
  icon: 'database'
  color: 'red'

inputs:
  target-environment:
    description: 'Target database environment'
    required: false
    default: 'default'
  target-url:
    description: 'JDBC URL for the target database'
    required: false
  target-user:
    description: 'Database user for the target database'
    required: false
  target-password:
    description: 'Database password for the target database'
    required: false
  target-schemas:
    description: 'Comma-separated list of schemas'
    required: false
  generate-undo:
    description: 'Generate undo script alongside deploy script'
    required: false
    default: 'true'
  fail-on-drift:
    description: 'Fail when drift is detected'
    required: false
    default: 'true'
  skip-drift-check:
    description: 'Skip the drift check'
    required: false
    default: 'false'
  fail-on-code-review:
    description: 'Fail when code review violations are detected'
    required: false
    default: 'true'
  skip-code-review:
    description: 'Skip the code review check'
    required: false
    default: 'false'
  working-directory:
    description: 'Working directory for Flyway'
    required: false
  extra-args:
    description: 'Additional Flyway CLI arguments'
    required: false
  skip-pre-deployment-report-upload:
    description: 'Skip uploading the pre-deployment report as a workflow artifact'
    required: false
    default: 'false'
  pre-deployment-report-name:
    description: 'Name for the pre-deployment report artifact'
    required: false
    default: 'flyway-pre-deployment-report'
  pre-deployment-report-retention-days:
    description: 'Number of days to retain the pre-deployment report artifact'
    required: false
    default: '7'
  skip-drift-resolution-scripts-upload:
    description: 'Skip uploading drift resolution scripts as a workflow artifact'
    required: false
    default: 'false'
  drift-resolution-scripts-name:
    description: 'Name for the drift resolution scripts artifact'
    required: false
    default: 'flyway-drift-resolution-scripts'
  drift-resolution-scripts-retention-days:
    description: 'Number of days to retain the drift resolution scripts artifact'
    required: false
    default: '7'

outputs:
  exit-code:
    description: 'Flyway exit code'
    value: ${{ steps.prepare.outputs.exit-code }}
  drift-detected:
    description: 'Whether drift was detected (empty if skipped)'
    value: ${{ steps.prepare.outputs.drift-detected }}
  code-violation-count:
    description: 'Number of code review violations found (empty if skipped)'
    value: ${{ steps.prepare.outputs.code-violation-count }}
  code-violation-codes:
    description: 'Comma-separated list of code review violation codes (empty if skipped)'
    value: ${{ steps.prepare.outputs.code-violation-codes }}
  script-path:
    description: 'Path to the generated deployment script'
    value: ${{ steps.prepare.outputs.script-path }}
  undo-script-path:
    description: 'Path to the generated undo script'
    value: ${{ steps.prepare.outputs.undo-script-path }}

runs:
  using: 'composite'
  steps:
    - name: Check for Node.js
      if: runner.environment != 'github-hosted'
      id: check-node
      run: |
        if ! command -v node &>/dev/null; then
          echo "node-not-found=true" >> "$GITHUB_OUTPUT"
        fi
      shell: bash
    - name: Install Node.js
      if: steps.check-node.outputs.node-not-found == 'true'
      uses: actions/setup-node@v4
      with:
        node-version: 'lts/*'
    - name: Run Flyway prepare
      id: prepare
      run: node "${{ github.action_path }}/dist/index.js"
      shell: bash
      env:
        FLYWAY_INPUTS: ${{ toJSON(inputs) }}
    - name: Upload pre-deployment report
      if: inputs.skip-pre-deployment-report-upload == 'false' && steps.prepare.outputs.report-path != '' && always()
      uses: actions/upload-artifact@v7
      with:
        name: ${{ inputs.pre-deployment-report-name }}
        path: ${{ steps.prepare.outputs.report-path }}
        archive: false
        retention-days: ${{ inputs.pre-deployment-report-retention-days }}
        if-no-files-found: ignore
    - name: Upload drift resolution scripts
      if: inputs.skip-drift-resolution-scripts-upload == 'false' && steps.prepare.outputs.drift-resolution-folder != '' && always()
      uses: actions/upload-artifact@v7
      with:
        name: ${{ inputs.drift-resolution-scripts-name }}
        path: ${{ steps.prepare.outputs.drift-resolution-folder }}
        retention-days: ${{ inputs.drift-resolution-scripts-retention-days }}
        if-no-files-found: ignore
