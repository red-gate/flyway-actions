name: 'Flyway Migrations Checks Action'
description: 'A GitHub Action to run pre-deployment checks on your Flyway migrations'
author: 'Redgate'

branding:
  icon: 'database'
  color: 'red'

inputs:
  target-environment:
    description: 'Target database to check'
    required: false
    default: 'default'
  target-url:
    description: 'JDBC URL for the target database to check'
    required: false
  target-user:
    description: 'Database user for the target database to check'
    required: false
  target-password:
    description: 'Database password for the target database to check'
    required: false
  target-schemas:
    description: 'Comma-separated list of schemas for the target database'
    required: false
  target-migration-version:
    description: 'Migrate up to this version for dry run'
    required: false
  cherry-pick:
    description: 'Comma-separated list of migration versions to include'
    required: false
  build-environment:
    description: 'Build database for generating a deployment changes report'
    required: false
  build-url:
    description: 'JDBC URL for the build database'
    required: false
  build-user:
    description: 'Database user for the build database'
    required: false
  build-password:
    description: 'Database password for the build database'
    required: false
  build-schemas:
    description: 'Comma-separated list of schemas for the build database'
    required: false
  build-ok-to-erase:
    description: 'Allow Flyway to erase the build database. This will delete all schema and data objects'
    required: false
    default: 'false'
  skip-code-review:
    description: 'Skip the code review check'
    required: false
    default: 'false'
  skip-drift-check:
    description: 'Skip the drift check'
    required: false
    default: 'false'
  skip-deployment-changes-report:
    description: 'Skip the deployment changes report'
    required: false
    default: 'false'
  skip-deployment-script-review:
    description: 'Skip the deployment script review (dry run)'
    required: false
    default: 'false'
  fail-on-code-review:
    description: 'Whether to fail the action when code review violations are found'
    required: false
    default: 'true'
  fail-on-drift:
    description: 'Whether to fail the action when drift is detected'
    required: false
    default: 'true'
  working-directory:
    description: 'Working directory for Flyway'
    required: false
  extra-args:
    description: 'Additional Flyway CLI arguments (e.g. -sqlMigrationPrefix=M)'
    required: false
  skip-pre-deployment-report-upload:
    description: 'Skip uploading the pre-deployment report as a workflow artifact'
    required: false
    default: 'false'
  pre-deployment-report-name:
    description: 'Name for the pre-deployment report artifact'
    required: false
    default: 'flyway-pre-deployment-report'
  pre-deployment-report-retention-days:
    description: 'Number of days to retain the pre-deployment report artifact'
    required: false
    default: '7'
  skip-drift-resolution-scripts-upload:
    description: 'Skip uploading drift resolution scripts as a workflow artifact'
    required: false
    default: 'false'
  drift-resolution-scripts-name:
    description: 'Name for the drift resolution scripts artifact'
    required: false
    default: 'flyway-drift-resolution-scripts'
  drift-resolution-scripts-retention-days:
    description: 'Number of days to retain the drift resolution scripts artifact'
    required: false
    default: '7'

outputs:
  exit-code:
    description: 'Flyway exit code'
    value: ${{ steps.checks.outputs.exit-code }}
  drift-detected:
    description: 'Whether drift was detected (empty if skipped)'
    value: ${{ steps.checks.outputs.drift-detected }}
  changed-object-count:
    description: 'Number of changed objects in the deployment (empty if skipped)'
    value: ${{ steps.checks.outputs.changed-object-count }}
  code-violation-count:
    description: 'Number of code review violations found (empty if skipped)'
    value: ${{ steps.checks.outputs.code-violation-count }}
  code-violation-codes:
    description: 'Comma-separated list of code review violation codes (empty if skipped)'
    value: ${{ steps.checks.outputs.code-violation-codes }}

runs:
  using: 'composite'
  steps:
    - name: Run Flyway checks
      id: checks
      run: node "${{ github.action_path }}/dist/index.js"
      shell: bash
      env:
        FLYWAY_INPUTS: ${{ toJSON(inputs) }}
    - name: Upload pre-deployment report
      if: inputs.skip-pre-deployment-report-upload == 'false' && always()
      uses: actions/upload-artifact@v7
      with:
        name: ${{ inputs.pre-deployment-report-name }}
        path: ${{ steps.checks.outputs.report-path }}
        archive: false
        retention-days: ${{ inputs.pre-deployment-report-retention-days }}
        if-no-files-found: ignore
    - name: Upload drift resolution scripts
      if: inputs.skip-drift-resolution-scripts-upload == 'false' && steps.checks.outputs.drift-resolution-folder != '' && always()
      uses: actions/upload-artifact@v7
      with:
        name: ${{ inputs.drift-resolution-scripts-name }}
        path: ${{ steps.checks.outputs.drift-resolution-folder }}
        retention-days: ${{ inputs.drift-resolution-scripts-retention-days }}
        if-no-files-found: ignore
