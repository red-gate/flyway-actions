name: 'Flyway Migrations Deployment Action'
description: 'A GitHub Action to deploy your Flyway migrations to a target database'
author: 'Redgate'

branding:
  icon: 'database'
  color: 'red'

inputs:
  target-environment:
    description: 'Target database to deploy to'
    required: false
    default: 'default'
  target-url:
    description: 'JDBC URL for the target database to deploy to'
    required: false
  target-user:
    description: 'Database user for the target database to deploy to'
    required: false
  target-password:
    description: 'Database password for the target database to deploy to'
    required: false
  target-schemas:
    description: 'Comma-separated list of schemas'
    required: false
  target-migration-version:
    description: 'Migrate up to this version'
    required: false
  cherry-pick:
    description: 'Comma-separated list of migration versions to deploy'
    required: false
  baseline-on-migrate:
    description: 'Whether to automatically baseline the target database on migrate'
    required: false
    default: 'true'
  skip-drift-check:
    description: 'Skip the drift check'
    required: false
    default: 'false'
  working-directory:
    description: 'Working directory for Flyway'
    required: false
  extra-args:
    description: 'Additional Flyway CLI arguments (e.g. -sqlMigrationPrefix=M)'
    required: false

outputs:
  exit-code:
    description: 'Flyway exit code'
    value: ${{ steps.deploy.outputs.exit-code }}
  drift-detected:
    description: 'Whether drift was detected (empty if skipped)'
    value: ${{ steps.deploy.outputs.drift-detected }}
  migrations-applied:
    description: 'Number of migrations applied'
    value: ${{ steps.deploy.outputs.migrations-applied }}
  schema-version:
    description: 'Schema version after deployment'
    value: ${{ steps.deploy.outputs.schema-version }}

runs:
  using: 'composite'
  steps:
    - name: Run Flyway deploy
      id: deploy
      run: node "${{ github.action_path }}/dist/index.js"
      shell: bash
      env:
        FLYWAY_INPUTS: ${{ toJSON(inputs) }}
