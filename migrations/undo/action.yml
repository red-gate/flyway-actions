name: 'Flyway Migrations Undo Action'
description: 'A GitHub Action to undo your Flyway migrations on a target database'
author: 'Redgate'

branding:
  icon: 'database'
  color: 'red'

inputs:
  target-environment:
    description: 'Target database to undo migrations on'
    required: false
    default: 'default'
  target-url:
    description: 'JDBC URL for the target database to undo migrations on'
    required: false
  target-user:
    description: 'Database user for the target database to undo migrations on'
    required: false
  target-password:
    description: 'Database password for the target database to undo migrations on'
    required: false
  target-schemas:
    description: 'Comma-separated list of schemas'
    required: false
  target-migration-version:
    description: 'Undo migrations down to this version'
    required: false
  cherry-pick:
    description: 'Comma-separated list of migration versions to undo'
    required: false
  skip-drift-check:
    description: 'Skip the drift check'
    required: false
    default: 'false'
  working-directory:
    description: 'Working directory for Flyway'
    required: false
  extra-args:
    description: 'Additional Flyway CLI arguments (e.g. -sqlMigrationPrefix=M)'
    required: false
  skip-drift-report-upload:
    description: 'Skip uploading the drift report as a workflow artifact'
    required: false
    default: 'false'
  drift-report-name:
    description: 'Name for the drift report artifact'
    required: false
    default: 'flyway-undo-report'
  drift-report-retention-days:
    description: 'Number of days to retain the drift report artifact'
    required: false
    default: '7'
  skip-drift-resolution-scripts-upload:
    description: 'Skip uploading drift resolution scripts as a workflow artifact'
    required: false
    default: 'false'
  drift-resolution-scripts-name:
    description: 'Name for the drift resolution scripts artifact'
    required: false
    default: 'flyway-drift-resolution-scripts'
  drift-resolution-scripts-retention-days:
    description: 'Number of days to retain the drift resolution scripts artifact'
    required: false
    default: '7'

outputs:
  exit-code:
    description: 'Flyway exit code'
    value: ${{ steps.undo.outputs.exit-code }}
  drift-detected:
    description: 'Whether drift was detected (empty if skipped)'
    value: ${{ steps.undo.outputs.drift-detected }}
  migrations-undone:
    description: 'Number of migrations undone'
    value: ${{ steps.undo.outputs.migrations-undone }}
  schema-version:
    description: 'Schema version after undo'
    value: ${{ steps.undo.outputs.schema-version }}

runs:
  using: 'composite'
  steps:
    - name: Check for Node.js
      if: runner.environment != 'github-hosted'
      id: check-node
      run: |
        if ! command -v node &>/dev/null; then
          echo "node-not-found=true" >> "$GITHUB_OUTPUT"
        fi
      shell: bash
    - name: Install Node.js
      if: steps.check-node.outputs.node-not-found == 'true'
      uses: actions/setup-node@v4
      with:
        node-version: 'lts/*'
    - name: Run Flyway undo
      id: undo
      run: node "${{ github.action_path }}/dist/index.js"
      shell: bash
      env:
        FLYWAY_INPUTS: ${{ toJSON(inputs) }}
    - name: Upload drift report
      if: inputs.skip-drift-report-upload == 'false' && steps.undo.outputs.report-path != '' && always()
      uses: actions/upload-artifact@v7
      with:
        name: ${{ inputs.drift-report-name }}
        path: ${{ steps.undo.outputs.report-path }}
        archive: false
        retention-days: ${{ inputs.drift-report-retention-days }}
        if-no-files-found: ignore
    - name: Upload drift resolution scripts
      if: inputs.skip-drift-resolution-scripts-upload == 'false' && steps.undo.outputs.drift-resolution-folder != '' && always()
      uses: actions/upload-artifact@v7
      with:
        name: ${{ inputs.drift-resolution-scripts-name }}
        path: ${{ steps.undo.outputs.drift-resolution-folder }}
        retention-days: ${{ inputs.drift-resolution-scripts-retention-days }}
        if-no-files-found: ignore
